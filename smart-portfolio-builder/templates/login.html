<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Login - Smart Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #0f2027, #203a43, #2c5364);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-60px, -60px);
            }
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: cyan;
            border-radius: 50%;
            opacity: 0.7;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
            }

            to {
                transform: translateY(-10vh);
            }
        }

        .login-card {
            position: relative;
            width: 420px;
            padding: 50px;
            border-radius: 25px;
            backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.4);
            color: white;
            text-align: center;
            transition: transform 0.4s ease;
        }

        .login-card:hover {
            transform: rotateY(8deg) rotateX(5deg);
        }

        .login-card h2 {
            font-weight: 700;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px cyan;
            }

            to {
                text-shadow: 0 0 25px #00f2fe;
            }
        }

        .form-control {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            border-radius: 12px;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .form-control:focus {
            box-shadow: 0 0 20px cyan;
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        .btn-glow {
            background: linear-gradient(45deg, #00f2fe, #0072ff);
            border: none;
            border-radius: 50px;
            padding: 12px;
            width: 100%;
            color: white;
            transition: 0.4s;
        }

        .btn-glow:hover {
            box-shadow: 0 0 30px cyan;
            transform: scale(1.05);
        }

        a {
            color: cyan;
            text-decoration: none;
        }

        /* Error Alert */
        .error-box {
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid rgba(255, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- Floating Particles -->
    <script>
        for (let i = 0; i < 30; i++) {
            let p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = (5 + Math.random() * 10) + "s";
            document.body.appendChild(p);
        }
    </script>

    <div class="login-card">
        <h2>AI Secure Login 🚀</h2>

        <!-- Flask Error Message -->
        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email Address" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-glow">Login</button>
        </form>

        <p class="mt-3">
            Don't have an account?
            <a href="{{ url_for('register') }}">Register</a>
        </p>


    </div>

</body>

</html>
