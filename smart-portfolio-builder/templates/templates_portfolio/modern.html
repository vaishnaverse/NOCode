<!DOCTYPE html>
<html>

<head>
    <title>Modern Developer Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI';
        }

        .hero {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        .section {
            padding: 60px 20px;
        }

        .project-card {
            transition: 0.3s;
        }

        .project-card:hover {
            transform: translateY(-8px);
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>Your Name</h1>
        <p>Full Stack Developer | Python | AI | Web</p>
    </div>

    <div class="container section">
        <h2>About Me</h2>
        <p>I am a passionate developer building scalable web applications and AI systems.</p>
    </div>

    <div class="container section">
        <h2>Projects</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card project-card shadow">
                    <div class="card-body">
                        <h5>Project One</h5>
                        <p>AI powered portfolio builder.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center p-4 bg-dark text-white">
        © 2026 Your Name
    </div>

</body>

</html>
