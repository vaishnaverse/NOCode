<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Register - Smart Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #141e30, #243b55);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-60px, -60px);
            }
        }

        .register-card {
            position: relative;
            width: 430px;
            padding: 50px;
            border-radius: 25px;
            backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.4);
            color: white;
            text-align: center;
        }

        .register-card h2 {
            font-weight: 700;
            margin-bottom: 30px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            border-radius: 12px;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .form-control:focus {
            box-shadow: 0 0 20px cyan;
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        .btn-glow {
            background: linear-gradient(45deg, #00f2fe, #0072ff);
            border: none;
            border-radius: 50px;
            padding: 12px;
            width: 100%;
            color: white;
        }

        .btn-glow:hover {
            box-shadow: 0 0 30px cyan;
            transform: scale(1.05);
        }

        a {
            color: cyan;
            text-decoration: none;
        }

        .error-box {
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid rgba(255, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div class="register-card">
        <h2>Create Account ✨</h2>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/register">

            <!-- ✅ Username Field ADDED -->
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            </div>

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Create Password" required>
            </div>

            <button type="submit" class="btn btn-glow">Register</button>
        </form>

        <p class="mt-3">
            Already have an account?
            <a href="/login">Login</a>
        </p>
    </div>

</body>

</html>
